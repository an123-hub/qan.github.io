<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple 3D Shooter</title>
<style>
body{margin:0;overflow:hidden;}
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.set(0,1.6,5);

let light = new THREE.PointLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

let floorGeo = new THREE.PlaneGeometry(100,100);
let floorMat = new THREE.MeshPhongMaterial({color:0x333333});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* súng */

let gunGeo = new THREE.BoxGeometry(0.3,0.2,1);
let gunMat = new THREE.MeshPhongMaterial({color:0x222222});
let gun = new THREE.Mesh(gunGeo,gunMat);

gun.position.set(0.5,-0.5,-1);
camera.add(gun);

scene.add(camera);

/* mob */

let mobGeo = new THREE.BoxGeometry(1,2,1);
let mobMat = new THREE.MeshPhongMaterial({color:0xff0000});
let mob = new THREE.Mesh(mobGeo,mobMat);

mob.position.set(0,1,0);
scene.add(mob);

let direction = 1;

/* điều khiển */

let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function move(){

let speed = 0.1;

if(keys["w"]) camera.position.z -= speed;
if(keys["s"]) camera.position.z += speed;
if(keys["a"]) camera.position.x -= speed;
if(keys["d"]) camera.position.x += speed;

}

/* mob di chuyển */

function mobMove(){

mob.position.x += 0.03*direction;

if(mob.position.x>5 || mob.position.x<-5){
direction *= -1;
}

}

/* loop */

function animate(){

requestAnimationFrame(animate);

move();
mobMove();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
