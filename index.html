<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zombie Game</title>
<style>
body{margin:0;background:black;}
canvas{display:block;margin:auto;background:#222;}
</style>
</head>

<body>
<canvas id="game" width="600" height="600"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let tile = 6; // 100x100 map
let player = {x:50,y:50,gun:false};
let gun = {x:20,y:20,active:true};
let zombies = [];

let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function spawnZombie(){
    zombies.push({x:Math.random()*100,y:Math.random()*100});
}

function update(){

    if(keys["w"]) player.y--;
    if(keys["s"]) player.y++;
    if(keys["a"]) player.x--;
    if(keys["d"]) player.x++;

    player.x=Math.max(0,Math.min(99,player.x));
    player.y=Math.max(0,Math.min(99,player.y));

    if(gun.active && player.x==gun.x && player.y==gun.y){
        player.gun=true;
        gun.active=false;

        for(let i=0;i<5;i++) spawnZombie();
    }

    zombies.forEach(z=>{
        let dx = player.x - z.x;
        let dy = player.y - z.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        z.x += dx/dist*0.2;
        z.y += dy/dist*0.2;
    });

    draw();
    requestAnimationFrame(update);
}

function draw(){
    ctx.clearRect(0,0,600,600);

    // player
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x*tile,player.y*tile,tile,tile);

    // gun
    if(gun.active){
        ctx.fillStyle="yellow";
        ctx.fillRect(gun.x*tile,gun.y*tile,tile,tile);
    }

    // zombies
    ctx.fillStyle="red";
    zombies.forEach(z=>{
        ctx.fillRect(z.x*tile,z.y*tile,tile,tile);
    });
}

update();
</script>

</body>
</html>
